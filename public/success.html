<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .success-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        text-align: center;
    }

    h1 {
        color: green;
        margin-bottom: 15px;
        font-size: 28px;
    }

    p {
        color: #555;
        font-size: 16px;
    }

    button {
        margin-top: 25px;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: green;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: darkgreen;
    }
</style>
</head>
<body>
<div class="success-container">
    <h1>✅ Verification Successful!</h1>
    <p>Thank you for completing the verification process.</p>
    <button onclick="window.location.href='index.html'">Go to Home</button>
</div>
</body>
</html>
