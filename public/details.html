<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 25px;
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    /* Checkbox row */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      font-size: 14px;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:disabled {
      background: #a0b8ff;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      background: #004ecc;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>User Details</h2>

  <form id="detailsForm">
    <label>FULL NAME</label>
    <input id="name" type="text" placeholder="Full Name" required>

    <label>Airtel NUMBER</label>
    <input id="phone" type="text" placeholder="07XXXXXXXX" required>

    <label>Email</label>
    <input id="email" type="email" placeholder="Email" required>

    <label>NATIONAL ID</label>
    <input id="nationalId" type="text" placeholder="National ID" required>

    <label>DATE OF BIRTH</label>
    <input id="dob" type="date" required>

    <div class="checkbox-row">
      <input type="checkbox" id="confirm">
      <span>I confirm the information provided is correct</span>
    </div>

    <button type="submit" id="nextBtn" disabled>Next</button>
  </form>
</div>

<script>
const checkbox = document.getElementById('confirm');
const nextBtn = document.getElementById('nextBtn');

checkbox.addEventListener('change', () => {
  nextBtn.disabled = !checkbox.checked;
});

document.getElementById('detailsForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();
  const nationalId = document.getElementById('nationalId').value.trim();
  const dob = document.getElementById('dob').value;

  if (!name || !phone || !email || !nationalId || !dob) {
    alert('Please fill all fields');
    return;
  }

  localStorage.setItem('loanDetails', JSON.stringify({
    name,
    phone,
    email,
    nationalId,
    dob
  }));

  window.location.href = 'pin.html';
});
</script>

</body>
</html>
