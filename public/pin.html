<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter PIN</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.pin-container {
    width: 90%;
    max-width: 400px;
    text-align: center;
}

h1 {
    color: #d60000; /* Airtel red */
    font-size: 32px;
    margin-bottom: 5px;
}

h2 {
    font-weight: normal;
    font-size: 20px;
    margin-top: 0;
    margin-bottom: 20px;
    color: #333;
}

#phoneDisplay {
    width: 100%;
    padding: 12px;
    border: 2px solid #d60000;
    border-radius: 8px;
    font-size: 18px;
    text-align: center;
    margin-bottom: 15px;
    pointer-events: none; /* Non-editable */
    background: #fff;
    box-sizing: border-box;
}

.pin-boxes {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.pin-boxes input {
    width: 55px;
    height: 55px;
    font-size: 24px;
    text-align: center;
    border: 2px solid #d60000;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #ccc;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: not-allowed;
    display: flex;
    justify-content: center;
    align-items: center;
}

button.enabled {
    background: #d60000;
    cursor: pointer;
}

.status {
    margin-top: 10px;
    font-size: 14px;
    color: red;
}

.terms {
    margin-top: 30px;
    font-size: 14px;
    color: #555;
}
</style>
</head>
<body>

<div class="pin-container">
    <h1>Airtel</h1>
    <h2>Welcome</h2>

    <input id="phoneDisplay" type="text" readonly>

    <p>Enter your PIN</p>
    <form id="pinForm">
        <div class="pin-boxes">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
        </div>
        <button id="submitBtn" disabled>Login</button>
    </form>

    <p class="terms">By continuing, you agree to the Terms and Conditions</p>
    <div class="status" id="status"></div>
</div>
